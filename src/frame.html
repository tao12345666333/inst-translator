<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>inst-translator</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      * { box-sizing: border-box; }
      h1, h2, h3, h4, h5, h6, p { margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;
        background: transparent;
      }
      .container {
        box-sizing: border-box;
        padding: 12px;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow: hidden;
      }
      .row { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
      h3 { margin: 0; flex-shrink: 0; }
      textarea {
        width: 100%;
        height: auto;
        min-height: 120px;
        max-height: 220px;
        flex: 0 1 auto;
        resize: vertical;
        box-sizing: border-box;
        font-size: 14px;
        padding: 8px;
      }
      .muted { color: #666; font-size: 12px; flex-shrink: 0; }
      .out {
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14px;
        flex: 1 1 0;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 10px;
        box-sizing: border-box;
        background: #f9f9f9;
        border-radius: 8px;
        border: 1px solid #e0e0e0;
      }
      .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
      .controls .grow { margin-left: auto; }
      .custom-prompt {
        width: 100%;
        height: 84px;
        min-height: 64px;
        margin: 0 0 8px;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        resize: vertical;
      }
      .hidden { display: none; }
      select, button { height: 30px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row" style="justify-content: space-between;">
<h3 style="margin: 0;">inst-translator</h3>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="muted">On-page • ESC to close</div>
          <button id="st-close-btn" title="Close" style="border:none;background:transparent;cursor:pointer;font-size:18px;line-height:18px;padding:0 4px;color:inherit">×</button>
        </div>
      </div>

      <div class="controls">
        <label>Mode:</label>
        <select id="actionMode">
          <option value="translate">Translate</option>
          <option value="summarize">Summarize</option>
          <option value="polish">Polish</option>
          <option value="explain">Explain</option>
          <option value="custom">Custom Prompt</option>
        </select>
        <label>Source:</label>
        <select id="sourceLang">
          <option value="auto">Auto</option>
          <option value="en">English</option>
          <option value="zh-Hans">简体中文</option>
          <option value="ja">日本語</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
        </select>
        <label>Target:</label>
        <select id="targetLang">
          <option value="zh-Hans">简体中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
        </select>
        <button class="grow" id="runBtn" title="Run">Run</button>
        <button id="stopBtn" title="Stop">Stop</button>
        <button id="copyBtn" title="Copy translation">Copy</button>
      </div>

      <textarea id="customPrompt" class="custom-prompt hidden" placeholder="Custom instruction, e.g. rewrite as a concise email in English"></textarea>
      <textarea id="input" placeholder="Type or paste text here…"></textarea>
      <div class="muted" id="status">Idle</div>
      <div class="out" id="output"></div>
    </div>

    <script src="/src/frame-boot.js" type="module"></script>
    <script src="/src/popup.js" type="module"></script>
  </body>
</html>
