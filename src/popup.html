<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>inst-translator</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif;
        min-width: 700px;
        min-height: 600px;
        background: #fff;
      }
      .container {
        box-sizing: border-box;
        padding: 12px;
        width: 100%;
        height: 100%;
        max-width: 100vw;
      }
      .row { display: flex; gap: 8px; align-items: center; }
      textarea {
        width: 100%;
        height: 260px;
        min-height: 140px;
        resize: vertical;
        box-sizing: border-box;
        font-size: 14px;
        padding: 8px;
      }
      .muted { color: #666; font-size: 12px; }
      .out {
        white-space: pre-wrap;
        font-size: 14px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px;
        min-height: 170px;
        overflow: auto;
        background: #fafafa;
      }
      .controls { margin: 8px 0; display:flex; gap:8px; align-items:center; flex-wrap: wrap; }
      .controls .grow { margin-left: auto; }
      select, button { height: 30px; }
      .custom-prompt {
        width: 100%;
        height: 84px;
        min-height: 64px;
        margin: 0 0 8px;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        resize: vertical;
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row" style="justify-content: space-between;">
<h3 style="margin: 0;">inst-translator</h3>
        <div class="muted">Chrome Built-in AI • On-device</div>
      </div>

      <div class="controls">
        <label>Mode:</label>
        <select id="actionMode">
          <option value="translate">Translate</option>
          <option value="summarize">Summarize</option>
          <option value="polish">Polish</option>
          <option value="explain">Explain</option>
          <option value="custom">Custom Prompt</option>
        </select>
        <label>Source:</label>
        <select id="sourceLang">
          <option value="auto">Auto</option>
          <option value="en">English</option>
          <option value="zh-Hans">简体中文</option>
          <option value="ja">日本語</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
        </select>
        <label>Target:</label>
        <select id="targetLang">
          <option value="zh-Hans">简体中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
        </select>
        <button class="grow" id="runBtn" title="Run">Run</button>
        <button id="stopBtn" title="Stop">Stop</button>
        <button id="copyBtn" title="Copy translation">Copy</button>
      </div>

      <textarea id="customPrompt" class="custom-prompt hidden" placeholder="Custom instruction, e.g. rewrite as a concise email in English"></textarea>
      <textarea id="input" placeholder="Type or paste text here…"></textarea>
      <div class="muted" id="status">Idle</div>
      <div class="out" id="output"></div>
    </div>

    <script src="/src/popup.js" type="module"></script>
  </body>
</html>
